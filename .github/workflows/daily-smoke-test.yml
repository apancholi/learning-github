name: Daily Smoke Test

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest-playwright
          playwright install --with-deps

      - name: Run daily smoke test
        id: run_tests
        run: pytest tests/test_daily_smoke.py -v > test_output.txt 2>&1
        continue-on-error: true

      - name: Send email with results
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Daily Smoke Test Results - ${{ job.status }}"
          to: pancholiasmit@gmail.com
          from: Avlokan Site Monitor
          body: file://test_output.txt

      - name: Fail the job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
